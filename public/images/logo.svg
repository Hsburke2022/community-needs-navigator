<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#527248"/>

  <!-- Compass ring -->
  <circle cx="100" cy="100" r="72" stroke="#A8C49A" stroke-width="3" fill="none" stroke-dasharray="6 4"/>

  <!-- Compass cardinal marks -->
  <line x1="100" y1="30" x2="100" y2="42" stroke="#C8DBBE" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="158" x2="100" y2="170" stroke="#C8DBBE" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="100" x2="42" y2="100" stroke="#C8DBBE" stroke-width="3" stroke-linecap="round"/>
  <line x1="158" y1="100" x2="170" y2="100" stroke="#C8DBBE" stroke-width="3" stroke-linecap="round"/>

  <!-- Compass needle pointing north -->
  <polygon points="100,52 95,100 100,110 105,100" fill="white"/>
  <polygon points="100,148 95,100 100,110 105,100" fill="#A8C49A"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="white"/>
  <circle cx="100" cy="100" r="3" fill="#527248"/>

  <!-- Sprout stem -->
  <path d="M100 130 Q100 105 100 88" stroke="#C8DBBE" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Left leaf -->
  <path d="M100 104 Q82 96 78 80 Q90 76 100 88" fill="#A8C49A"/>

  <!-- Right leaf -->
  <path d="M100 96 Q118 88 122 72 Q110 68 100 80" fill="#C8DBBE"/>

  <!-- Small bud at top of stem -->
  <ellipse cx="100" cy="86" rx="5" ry="7" fill="#C8DBBE" transform="rotate(-10 100 86)"/>
</svg>
